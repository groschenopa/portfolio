  /* Fester Light-Look (deterministischer Export, unabhängig vom System-Theme) */
  :root{
    --paper:#FBFAF7; --paper-2:#F1EEE7; --ink:#121317; --ink-2:#55555E;
    --accent:#0C6B74; --accent-ink:#FFFFFF;
    --font-display:'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --font-body:system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body); background:#0a0a0c; color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:geometricPrecision;
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    position:relative; width:100vw; height:100vh; height:100dvh; overflow:hidden;
    display:flex; flex-direction:column; background:var(--ink);
  }

  .head{
    background:var(--paper); padding:6vw 6.5vw;
    display:flex; align-items:center; justify-content:space-between; gap:4vw;
  }
  .brand{display:flex; align-items:center; gap:3vw}
  .brand-logo{width:12vw; height:12vw; display:block; flex:0 0 auto}
  .brand-name{font-family:var(--font-display); font-weight:700; font-size:6.6vw; line-height:1.0; letter-spacing:-.02em; color:var(--ink)}
  .brand-name .dot{color:var(--accent)}
  .claim{font-family:var(--font-display); font-weight:700; font-size:5.6vw; line-height:1.04; letter-spacing:-.01em; color:var(--accent); text-align:right}

  .body{
    flex:1; background:var(--ink); color:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6vw 6.5vw;
    background-image:radial-gradient(125% 62% at 50% 16%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%);
  }
  .eyebrow{
    font-family:var(--font-display); font-weight:600; font-size:4.1vw;
    letter-spacing:.26em; text-transform:uppercase;
    color:color-mix(in srgb, var(--paper) 80%, transparent); margin-bottom:5.5vw;
  }
  .qr-panel{
    background:#fff; border-radius:5vw; padding:4.5vw; width:62vw; height:62vw; flex:0 0 auto;
    box-shadow:0 3vw 8vw rgba(0,0,0,.42);
  }
  .qr-panel svg, .qr-panel img{display:block; width:100%; height:100%}
  .qr-panel img{image-rendering:pixelated}
  .url{font-family:var(--font-display); font-weight:600; font-size:6.2vw; color:var(--paper); margin-top:5.5vw}

  .contact{width:100%; margin-top:7.5vw; display:flex; flex-direction:column; gap:3vw}
  .row{
    display:flex; align-items:stretch; border-radius:3vw; overflow:hidden;
    border:1px solid color-mix(in srgb, var(--paper) 18%, transparent);
    background:color-mix(in srgb, var(--paper) 5%, transparent);
  }
  .row .key{
    background:var(--accent); color:var(--accent-ink);
    font-family:var(--font-display); font-weight:700; font-size:3.4vw; letter-spacing:.1em;
    padding:3.4vw 4vw; display:flex; align-items:center; white-space:nowrap;
  }
  .row .val{
    flex:1; min-width:0; display:flex; align-items:center; gap:2.6vw;
    padding:3.4vw 4.2vw; font-size:3.85vw; color:var(--paper); white-space:nowrap;
  }
  .row .val svg{width:4.6vw; height:4.6vw; flex:0 0 auto; opacity:.9}

  .foot{
    background:var(--paper); color:var(--ink-2); text-align:center; padding:4.6vw;
    font-family:var(--font-display); font-weight:600; font-size:3.4vw; letter-spacing:.14em; text-transform:uppercase;
  }
</style>
